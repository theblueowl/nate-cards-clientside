<footer class="md:mt-8 text-cDark bg-cLight">
  <img class="hidden md:block" src="/largerrowofdutchhouses.svg" alt="" />

  <nav class="flex justify-evenly md:justify-center items-center bg-cDark text-cLight py-6 shadow-material mb-2">
    @for (item of navItems; track item.id) {
      <div
        class="py-2 px-2 cursor-pointer md:min-w-35 text-center min-w-20"
        [routerLink]="item.route"
        routerLinkActive="bg-cLight text-cDark rounded-4xl shadow-material border-2 border-dashed border-cDark"
        [routerLinkActiveOptions]="{ exact: true }"
      >{{item.name}}</div>
    }
  </nav>

  <div class="py-2 md:py-4 flex flex-col md:flex-row md:justify-between px-8 gap-4">
    <p class="text-center">© Copyright 2026 Natasha Trpevska - Nate.Cards</p>
    <p class="text-center">
      Made by:
      <a class="underline" href="https://ntrpevska.wordpress.com/" target="_blank"
      >Natasha Trpevska</a
      >
      &
      <a class="underline" href="https://github.com/ivanlazarevski" target="_blank"
      >Ivan Lazarevski</a
      >
    </p>
  </div>
  <div>
    <p class="text-center pb-4 px-4">Do not sell or share my personal information. Do not use my content to train AI models.</p>
  </div>
</footer>
