<div class="px-8 pt-4 pb-8">
  <h1 class="text-3xl my-4 font-semibold text-accent">Контактирај Ме</h1>
  <p class="text-cDark">
    Ве молам закажувајте нарачки барем еден месец однапред, за да имаме време за дополнителна комуникација
    и достава.
  </p>
  <form [formGroup]="commentForm" class="flex flex-col items-center justify-center">
    <label class="my-3 w-full text-primary font-semibold">
      Емаил: <span class="text-red-500">*</span>
      <input
        class="w-full bg-primary/10 outline-none p-4 rounded-4xl"
        type="email"
        autocomplete="off"
        formControlName="email"
        placeholder="Внеси емаил..."
      />
    </label>
    <label class="my-3 w-full text-primary font-semibold">
      Наслов: <span class="text-red-500">*</span>
      <input
        class="w-full bg-primary/10 outline-none p-4 rounded-4xl"
        type="text"
        autocomplete="off"
        formControlName="title"
        placeholder="Внеси наслов..."
      />
    </label>
    <label class="my-3 w-full text-primary font-semibold">
      Порака: <span class="text-red-500">*</span>
      <textarea
        class="w-full bg-primary/10 outline-none p-4 h-52 rounded-4xl"
        formControlName="message"
        placeholder="Внеси порака..."
      ></textarea>
      <small>{{ commentForm.controls.message.value?.length }}/1500</small>
    </label>
    <div class="flex gap-2">
      <ngx-recaptcha2
        #captchaElem
        [siteKey]="siteKey"
        [useGlobalDomain]="false"
        formControlName="captcha"
        class="my-3"
      >
      </ngx-recaptcha2>
      <div class="text-red-500 font-bold">*</div>
    </div>
    @if(!commentForm.valid) {
      <p class="self-start text-xs text-red-500">
        (<span class="font-bold">*</span>) Полињата се задолжителни.
      </p>
    }
    <app-button
      class="block w-full"
      [btnValid]="commentForm.valid"
      [btnText]="'Прати'"
      (click)="postComment()"
    />
  </form>
</div>
